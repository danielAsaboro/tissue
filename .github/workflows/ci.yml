name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from packageManager in package.json (do not also pin it here,
      # or action-setup errors with ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24: node:sqlite (used by the analyst read-model) is unflagged here; on 22 it
          # still needs --experimental-sqlite.
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # typecheck every package (shared + daemon + dashboard)
      - run: pnpm -r typecheck
      # pricing units, risk property tests, replay-equality CI, chaos drills
      - run: pnpm --filter @tissue/daemon test:run
      # analyst layer: read-only-by-construction + statelessness + LLM fallback
      - run: pnpm --filter @tissue/analyst test:run
      # determinism smoke: replay must reproduce an intact, deterministic ledger
      - run: pnpm --filter @tissue/daemon replay
